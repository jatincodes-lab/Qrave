services:
  api:
    build:
      context: .
      dockerfile: src/backend/QRApp.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-QRApp};Username=${POSTGRES_USER:-qrapp};Password=${POSTGRES_PASSWORD:-qrapp_dev_password};Pooling=true;Timeout=15;Command Timeout=30
      Redis__ConnectionString: redis:6379
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-QRApp}
      POSTGRES_USER: ${POSTGRES_USER:-qrapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qrapp_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qrapp} -d ${POSTGRES_DB:-QRApp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data: